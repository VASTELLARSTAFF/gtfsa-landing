<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{color:white;}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
z-index:10;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

/* LOGO MEJORADO */
nav img{
height:85px;
position:absolute;
left:30px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:12px;
backdrop-filter:blur(8px);
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

nav ul{
display:flex;
gap:40px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
opacity:0.9;
}

/* LANGUAGE */
.lang{
position:absolute;
right:30px;
display:flex;
gap:10px;
}

.lang button{
background:none;
border:1px solid white;
color:white;
padding:5px 10px;
cursor:pointer;
border-radius:6px;
}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* VIDEO */
.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:1;
}

/* CONTENT */
.content{
position:relative;
z-index:2;
max-width:800px;
}

/* ANIMACIÓN SUAVE */
.fade{
opacity:0;
transform:translateY(40px);
animation:fadeIn 2s ease forwards;
}

.delay1{animation-delay:0.5s;}
.delay2{animation-delay:1s;}
.delay3{animation-delay:1.5s;}

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* TEXT */
h1{
font-size:58px;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:30px;
opacity:0.9;
}

/* BUTTON */
.btn{
padding:14px 30px;
border-radius:30px;
background:white;
color:black;
text-decoration:none;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:24px;
z-index:20;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<img src="logo.png">

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">

<h1 class="fade delay1"
data-en="Grupo Tierra Firme S.A."
data-es="Grupo Tierra Firme S.A.">
Grupo Tierra Firme S.A.
</h1>

<p class="fade delay2"
data-en="Strategic Investments And Capital Solutions"
data-es="Inversiones Estratégicas Y Soluciones De Capital">
Strategic Investments And Capital Solutions
</p>

<a href="#contact" class="btn fade delay3"
data-en="Get Started"
data-es="Comenzar">
Get Started
</a>

</div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/123456789">
<i class="fab fa-whatsapp"></i>
</a>

<script>

/* LANGUAGE SWITCH */
function setLang(lang){
document.querySelectorAll('[data-en]').forEach(el=>{
el.innerText = el.getAttribute('data-' + lang);
});
}

</script>

</body>
</html>
