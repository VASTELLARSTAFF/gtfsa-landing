<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;overflow-x:hidden}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
z-index:1000;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
}

/* LOGO MEJORADO */
.logo{
background:rgba(255,255,255,0.9); /* MÁS CLARO */
padding:14px 26px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
height:90px; /* MÁS GRANDE */
display:block;
}

/* MENU */
.menu{
display:flex;
gap:30px;
}
.menu a{
color:#fff;
text-decoration:none;
font-weight:500;
}

/* IDIOMA */
.lang{
display:flex;
background:rgba(255,255,255,0.15);
padding:4px;
border-radius:30px;
}

.lang button{
border:none;
background:transparent;
color:#fff;
padding:6px 14px;
cursor:pointer;
border-radius:20px;
font-weight:500;
transition:0.3s;
}

.lang button.active{
background:#fff;
color:#111;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:0 20px;
}

.hero h1{
font-size:3.5rem;
font-weight:700;
letter-spacing:-1px;
}

.hero p{
margin-top:20px;
font-size:1.3rem;
opacity:0.9;
}
  <div style="margin-top:60px;opacity:0.7;font-size:0.9rem;">
Trusted across multiple industries worldwide
</div>

/* VIDEO FIX REAL */
video{
position:absolute;
top:50%;
left:50%;
width:100%;
height:auto;
min-height:100%;
transform:translate(-50%,-50%);
object-fit:cover;
z-index:-2;
}

.overlay{
background:linear-gradient(
to bottom,
rgba(0,0,0,0.6),
rgba(0,0,0,0.4)
);
}

/* ANIMACIONES */
.fade-in{
opacity:0;
transform:translateY(40px);
animation:fadeUp 2s ease forwards;
}
.fade-in.delay{animation-delay:0.8s;}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.hero h1{font-size:3rem;font-weight:700;}
.hero p{margin-top:15px;font-size:1.2rem;}

/* BOTON */
.btn{
margin-top:30px;
padding:14px 38px;
border-radius:40px;
background:linear-gradient(135deg,#2563eb,#1e40af);
color:#fff;
text-decoration:none;
font-weight:600;
transition:all 0.3s ease;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

/* SECCIONES */
section{
padding:120px 20px;
text-align:center;
max-width:1000px;
margin:auto;
}

.fade-section{
opacity:0;
transform:translateY(50px);
transition:all 1s ease;
}
.fade-section.show{
opacity:1;
transform:translateY(0);
}

/* SOCIALS */
.socials{
position:fixed;
left:20px;
bottom:20px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
}
.socials a{color:#fff;text-decoration:none;}

/* WHATSAPP */
.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:#fff;
padding:14px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:15px;
max-width:400px;
}
input, textarea{
padding:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<nav>
<div class="logo">
<img src="./logo.png">
</div>

<div class="menu">
<a href="#home" data-es="Inicio" data-en="Home">Home</a>
<a href="#about" data-es="Nosotros" data-en="About">About</a>
<a href="#services" data-es="Servicios" data-en="Services">Services</a>
<a href="#contact" data-es="Contacto" data-en="Contact">Contact</a>
</div>

<div class="lang">
<button onclick="setLang('es')" id="btn-es">ES</button>
<button onclick="setLang('en')" id="btn-en">EN</button>
</div>
</nav>

<section class="hero" id="home">

<video autoplay muted loop playsinline>
<source src="./video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div>
<h1 class="fade-in" data-es="Grupo Tierra Firme S.A." data-en="Grupo Tierra Firme S.A."></h1>

<p class="fade-in delay" 
data-es="Transformando Industrias. Construyendo el Futuro." 
data-en="Transforming Industries. Building the Future."></p>

<a href="#contact" class="btn" data-es="Contáctanos" data-en="Get Started"></a>
</div>

</section>

<section id="about" class="fade-section">
<h2 class="section-title" data-es="Quiénes Somos" data-en="Who We Are"></h2>
<p data-es="Grupo Tierra Firme es un grupo empresarial multidisciplinario que ofrece soluciones estratégicas en múltiples industrias."
data-en="Grupo Tierra Firme is a multidisciplinary business group delivering strategic solutions across industries."></p>
</section>

<section id="services" class="fade-section">
<h2 class="section-title" data-es="Servicios" data-en="Services"></h2>
<p data-es="Construcción, Tecnología, Salud, Finanzas, Logística y Asesoría."
data-en="Construction, Technology, Healthcare, Finance, Logistics, Advisory."></p>
</section>

<section id="contact" class="fade-section">
<h2 class="section-title" data-es="Contacto" data-en="Contact"></h2>

<form action="https://formspree.io/f/mbdwjgzz" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit" class="btn" data-es="Enviar" data-en="Send"></button>
</form>

</section>

<div class="socials">
<a href="#">LinkedIn</a>
<a href="#">Instagram</a>
<a href="#">Facebook</a>
</div>

<a href="https://wa.me/123456789" class="whatsapp">💬</a>

<script>

/* SCROLL */
const sections = document.querySelectorAll('.fade-section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
const top = sec.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
sec.classList.add('show');
}
});
});

/* IDIOMA PRO */
function setLang(lang){
localStorage.setItem("lang", lang);

document.querySelectorAll('[data-es]').forEach(el=>{
el.innerText = el.getAttribute('data-'+lang);
});

/* BOTON ACTIVO */
document.getElementById("btn-es").classList.remove("active");
document.getElementById("btn-en").classList.remove("active");
document.getElementById("btn-"+lang).classList.add("active");
}

/* CARGA INICIAL */
const savedLang = localStorage.getItem("lang") || "es";
setLang(savedLang);

</script>

</body>
</html>
