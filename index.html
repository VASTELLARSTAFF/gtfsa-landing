<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{color:white;overflow-x:hidden;}

/* NAV PREMIUM */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
z-index:20;
background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}

nav img{
height:70px;
position:absolute;
left:40px;
opacity:0;
animation:fadeDown 1.5s ease forwards;
}

nav ul{
display:flex;
gap:50px;
list-style:none;
opacity:0;
animation:fadeDown 1.5s ease forwards;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
letter-spacing:1px;
opacity:0.8;
}

nav a:hover{opacity:1;}

/* LANGUAGE */
.lang{
position:absolute;
right:40px;
display:flex;
gap:10px;
}

.lang button{
background:transparent;
border:1px solid rgba(255,255,255,0.5);
color:white;
padding:5px 12px;
cursor:pointer;
border-radius:20px;
font-size:12px;
}

/* HERO VIDEO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* VIDEO PERFECT COVER */
.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
filter:brightness(0.7);
}

/* GRADIENT OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.8));
z-index:1;
}

/* CONTENT */
.content{
position:relative;
z-index:2;
max-width:900px;
}

/* ANIMATIONS */
.fade-up{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.5s ease forwards;
}

.delay1{animation-delay:0.5s;}
.delay2{animation-delay:1s;}
.delay3{animation-delay:1.5s;}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeDown{
to{
opacity:1;
transform:translateY(0);
}
}

/* TEXT */
h1{
font-size:64px;
font-weight:600;
margin-bottom:20px;
}

p{
font-size:18px;
opacity:0.85;
margin-bottom:30px;
}

/* BUTTON */
.btn{
padding:14px 35px;
border-radius:30px;
background:white;
color:black;
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.btn:hover{
background:#ddd;
}

/* SCROLL INDICATOR */
.scroll{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
opacity:0.6;
font-size:12px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0);}
50%{transform:translate(-50%,10px);}
}

/* FORM */
.form-section{
padding:100px 20px;
background:#0b0b0b;
text-align:center;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:14px;
border-radius:10px;
border:none;
}

button{
background:white;
color:black;
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
padding:16px;
border-radius:50%;
font-size:26px;
z-index:30;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<img src="logo.png">

<ul>
<li><a href="#" data-en="Home" data-es="Inicio">Home</a></li>
<li><a href="#form" data-en="Contact" data-es="Contacto">Contact</a></li>
</ul>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">

<h1 class="fade-up delay1"
data-en="Grupo Tierra Firme S.A."
data-es="Grupo Tierra Firme S.A.">
Grupo Tierra Firme S.A.
</h1>

<p class="fade-up delay2"
data-en="Strategic investments and capital solutions"
data-es="Inversiones estratégicas y soluciones de capital">
Strategic investments and capital solutions
</p>

<a href="#form" class="btn fade-up delay3"
data-en="Get Started"
data-es="Comenzar">
Get Started
</a>

</div>

<div class="scroll">Scroll ↓</div>

</section>

<!-- FORM -->
<section id="form" class="form-section">
<h2 data-en="Get in Touch" data-es="Contáctanos">Get in Touch</h2>

<form action="https://formspree.io/f/mbdwjgzz" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/1234567890" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>
function setLang(lang){
document.querySelectorAll('[data-en]').forEach(el=>{
el.innerText = el.getAttribute('data-' + lang);
});
}
</script>

</body>
</html>
