<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#35383B;
color:#fff;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
z-index:1000;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

/* LOGO */
.logo{
background:#9BA7B3; /* 🔥 NUEVO COLOR */
padding:12px 24px;
border-radius:14px;
}
.logo img{
height:95px;
}

/* MENU */
.menu{
display:flex;
gap:25px;
}
.menu a{
color:#fff;
text-decoration:none;
font-weight:500;
}

/* LANG */
.lang{
display:flex;
gap:6px;
}
.lang button{
background:transparent;
border:1px solid #fff;
color:#fff;
padding:6px 12px;
cursor:pointer;
border-radius:20px;
}
.lang button.active{
background:#fff;
color:#000;
}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* 🔥 VIDEO MEJORADO (MÁS GRANDE) */
.hero video{
position:absolute;
top:50%;
left:50%;
width:120%;
height:120%;
min-width:100%;
min-height:100%;
transform:translate(-50%,-50%);
object-fit:cover;
z-index:-2;
}

/* 🔥 OVERLAY AJUSTADO */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* HERO TEXT */
.hero h1{
font-size:3.5rem;
font-weight:700;
}
.hero p{
margin-top:15px;
font-size:1.2rem;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:12px 30px;
border-radius:30px;
background:#2563eb;
color:#fff;
text-decoration:none;
display:inline-block;
}

/* SECTIONS */
section{
padding:100px 20px;
max-width:900px;
margin:auto;
text-align:center;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:15px;
max-width:400px;
margin:auto;
}
input, textarea{
padding:12px;
border:none;
border-radius:6px;
background:#4B5563;
color:#fff;
}

/* SOCIALS */
.socials{
position:fixed;
left:20px;
bottom:20px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:12px;
}
.socials svg{
width:22px;
height:22px;
fill:#fff;
transition:0.3s;
}
.socials a:hover svg{
transform:scale(1.2);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
padding:16px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}
.whatsapp svg{
width:26px;
height:26px;
fill:#fff;
}

</style>
</head>

<body>

<nav>
<div class="logo">
<img src="./logo.png">
</div>

<div class="menu">
<a href="#home" data-es="Inicio" data-en="Home"></a>
<a href="#about" data-es="Nosotros" data-en="About"></a>
<a href="#services" data-es="Servicios" data-en="Services"></a>
<a href="#contact" data-es="Contacto" data-en="Contact"></a>
</div>

<div class="lang">
<button onclick="setLang('es')" id="btn-es">ES</button>
<button onclick="setLang('en')" id="btn-en">EN</button>
</div>
</nav>

<section class="hero" id="home">

<video autoplay muted loop playsinline id="bg-video">
<source src="./video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div>
<h1 data-es="Grupo Tierra Firme S.A." data-en="Grupo Tierra Firme S.A."></h1>

<p data-es="Transformando Industrias. Construyendo el Futuro."
data-en="Transforming Industries. Building the Future."></p>

<a href="#contact" class="btn" data-es="Contáctanos" data-en="Get Started"></a>
</div>

</section>

<section id="about">
<h2 data-es="Quiénes Somos" data-en="Who We Are"></h2>
<p data-es="Grupo Tierra Firme es un grupo empresarial multidisciplinario que ofrece soluciones estratégicas en múltiples industrias."
data-en="Grupo Tierra Firme is a multidisciplinary business group delivering strategic solutions across industries."></p>
</section>

<section id="services">
<h2 data-es="Servicios" data-en="Services"></h2>
<p data-es="Construcción, Tecnología, Salud, Finanzas, Logística y Asesoría."
data-en="Construction, Technology, Healthcare, Finance, Logistics, Advisory."></p>
</section>

<section id="contact">
<h2 data-es="Contacto" data-en="Contact"></h2>

<form action="https://formspree.io/f/mbdwjgzz" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit" class="btn" data-es="Enviar" data-en="Send"></button>
</form>

</section>

<!-- SOCIAL ICONS -->
<div class="socials">
<a href="#"><svg viewBox="0 0 24 24"><path d="M22.23 0H1.77..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M7.75 2..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M22 12..."/></svg></a>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/123456789" class="whatsapp">
<svg viewBox="0 0 32 32">
<path d="M16 .4C7.4.4..."/>
</svg>
</a>

<script>
function setLang(lang){
localStorage.setItem("lang", lang);
document.querySelectorAll('[data-es]').forEach(el=>{
el.innerText = el.getAttribute('data-'+lang);
});
document.getElementById("btn-es").classList.remove("active");
document.getElementById("btn-en").classList.remove("active");
document.getElementById("btn-"+lang).classList.add("active");
}
setLang(localStorage.getItem("lang") || "es");
</script>

</body>
</html>
