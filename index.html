<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#5B6F75;
color:#fff;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
z-index:1000;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
}

/* LOGO */
.logo{
background:#fff;
padding:12px 24px;
border-radius:14px;
}
.logo img{
height:90px;
}

/* MENU */
.menu{
display:flex;
gap:25px;
}
.menu a{
color:#fff;
text-decoration:none;
font-weight:500;
}

/* LANG */
.lang{
display:flex;
gap:5px;
}
.lang button{
background:transparent;
border:1px solid #fff;
color:#fff;
padding:5px 12px;
cursor:pointer;
border-radius:20px;
}
.lang button.active{
background:#fff;
color:#000;
}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* 🔥 VIDEO FULL SCREEN REAL (ESTO ES LA CLAVE) */
.hero video{
position:absolute;
top:50%;
left:50%;
min-width:100%;
min-height:100%;
width:auto;
height:auto;
transform:translate(-50%,-50%);
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* HERO TEXT */
.hero h1{
font-size:3.5rem;
font-weight:700;
}

.hero p{
margin-top:15px;
font-size:1.2rem;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:12px 30px;
border-radius:30px;
background:#2563eb;
color:#fff;
text-decoration:none;
display:inline-block;
}

/* SECTIONS */
section{
padding:100px 20px;
max-width:900px;
margin:auto;
text-align:center;
}

/* SOCIALS */
.socials{
position:fixed;
left:20px;
bottom:20px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.socials svg{
width:22px;
height:22px;
fill:#fff;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
padding:14px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}
.whatsapp svg{
width:24px;
height:24px;
fill:#fff;
}

</style>
</head>

<body>

<nav>
<div class="logo">
<img src="./logo.png">
</div>

<div class="menu">
<a href="#home" data-es="Inicio" data-en="Home"></a>
<a href="#about" data-es="Nosotros" data-en="About"></a>
<a href="#services" data-es="Servicios" data-en="Services"></a>
<a href="#contact" data-es="Contacto" data-en="Contact"></a>
</div>

<div class="lang">
<button onclick="setLang('es')" id="btn-es">ES</button>
<button onclick="setLang('en')" id="btn-en">EN</button>
</div>
</nav>

<section class="hero" id="home">

<video autoplay muted loop playsinline id="bg-video">
<source src="./video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div>
<h1 data-es="Grupo Tierra Firme S.A." data-en="Grupo Tierra Firme S.A."></h1>

<p data-es="Transformando Industrias. Construyendo el Futuro."
data-en="Transforming Industries. Building the Future."></p>

<a href="#contact" class="btn" data-es="Contáctanos" data-en="Get Started"></a>
</div>

</section>

<section id="about">
<h2 data-es="Quiénes Somos" data-en="Who We Are"></h2>
<p data-es="Grupo Tierra Firme es un grupo empresarial multidisciplinario que ofrece soluciones estratégicas en múltiples industrias."
data-en="Grupo Tierra Firme is a multidisciplinary business group delivering strategic solutions across industries."></p>
</section>

<section id="services">
<h2 data-es="Servicios" data-en="Services"></h2>
<p data-es="Construcción, Tecnología, Salud, Finanzas, Logística y Asesoría."
data-en="Construction, Technology, Healthcare, Finance, Logistics, Advisory."></p>
</section>

<section id="contact">
<h2 data-es="Contacto" data-en="Contact"></h2>
</section>

<!-- SOCIAL ICONS -->
<div class="socials">
<a href="#"><svg viewBox="0 0 24 24"><path d="M22.23 0H1.77..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M7.75 2..."/></svg></a>
<a href="#"><svg viewBox="0 0 24 24"><path d="M22 12..."/></svg></a>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/123456789" class="whatsapp">
<svg viewBox="0 0 32 32">
<path d="M16 .4C7.4.4..."/>
</svg>
</a>

<script>
function setLang(lang){
localStorage.setItem("lang", lang);
document.querySelectorAll('[data-es]').forEach(el=>{
el.innerText = el.getAttribute('data-'+lang);
});
document.getElementById("btn-es").classList.remove("active");
document.getElementById("btn-en").classList.remove("active");
document.getElementById("btn-"+lang).classList.add("active");
}
setLang(localStorage.getItem("lang") || "es");

/* 🔥 HACE EL VIDEO MÁS PRO */
document.getElementById("bg-video").playbackRate = 0.8;
</script>

</body>
</html>
