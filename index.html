<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🔥 FONDO CORPORATIVO */
body{
font-family:'Inter',sans-serif;
background:#35383B;
color:#f1f5f9;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
z-index:1000;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
}

/* LOGO */
.logo{
background:#ffffff;
padding:14px 26px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
}
.logo img{
height:100px;
}

/* MENU */
.menu{
display:flex;
gap:30px;
}
.menu a{
color:#fff;
text-decoration:none;
font-weight:500;
}

/* LANG */
.lang{
display:flex;
background:rgba(255,255,255,0.2);
padding:4px;
border-radius:30px;
}
.lang button{
border:none;
background:transparent;
color:#fff;
padding:6px 14px;
cursor:pointer;
border-radius:20px;
}
.lang button.active{
background:#fff;
color:#111;
}

/* 🔥 HERO ARAYA STYLE */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* 🔥 VIDEO FULL SCREEN PERFECTO */
video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(0,0,0,0.65),
rgba(0,0,0,0.5)
);
z-index:-1;
}

/* HERO TEXT */
.hero h1{
font-size:3.5rem;
font-weight:700;
}

.hero p{
margin-top:20px;
font-size:1.3rem;
opacity:0.9;
}

/* BUTTON */
.btn{
margin-top:30px;
padding:14px 38px;
border-radius:40px;
background:linear-gradient(135deg,#2563eb,#1e40af);
color:#fff;
text-decoration:none;
font-weight:600;
transition:0.3s;
}
.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(37,99,235,0.4);
}

/* SECTIONS */
section{
padding:120px 20px;
max-width:1000px;
margin:auto;
text-align:center;
}

.section-title{
font-size:2rem;
margin-bottom:20px;
}

/* SCROLL */
.fade-section{
opacity:0;
transform:translateY(50px);
transition:all 1s ease;
}
.fade-section.show{
opacity:1;
transform:translateY(0);
}

/* 🔥 SOCIAL ICONS REALES */
.socials{
position:fixed;
left:20px;
bottom:20px;
background:rgba(0,0,0,0.5);
padding:14px;
border-radius:14px;
display:flex;
flex-direction:column;
gap:14px;
}

.socials a svg{
width:22px;
height:22px;
fill:#fff;
transition:0.3s;
}
.socials a:hover svg{
transform:scale(1.2);
}

/* 🔥 WHATSAPP */
.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
padding:16px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.whatsapp svg{
width:26px;
height:26px;
fill:#fff;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:15px;
max-width:400px;
margin:auto;
}
input, textarea{
padding:12px;
border:none;
border-radius:6px;
background:#334155;
color:#fff;
}

</style>
</head>

<body>

<nav>
<div class="logo">
<img src="./logo.png">
</div>

<div class="menu">
<a href="#home" data-es="Inicio" data-en="Home"></a>
<a href="#about" data-es="Nosotros" data-en="About"></a>
<a href="#services" data-es="Servicios" data-en="Services"></a>
<a href="#contact" data-es="Contacto" data-en="Contact"></a>
</div>

<div class="lang">
<button onclick="setLang('es')" id="btn-es">ES</button>
<button onclick="setLang('en')" id="btn-en">EN</button>
</div>
</nav>

<section class="hero" id="home">

<video autoplay muted loop playsinline>
<source src="./video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div>
<h1 data-es="Grupo Tierra Firme S.A." data-en="Grupo Tierra Firme S.A."></h1>

<p data-es="Transformando Industrias. Construyendo el Futuro." 
data-en="Transforming Industries. Building the Future."></p>

<a href="#contact" class="btn" data-es="Contáctanos" data-en="Get Started"></a>
</div>

</section>

<section id="about" class="fade-section">
<h2 class="section-title" data-es="Quiénes Somos" data-en="Who We Are"></h2>
<p data-es="Grupo Tierra Firme es un grupo empresarial multidisciplinario que ofrece soluciones estratégicas en múltiples industrias."
data-en="Grupo Tierra Firme is a multidisciplinary business group delivering strategic solutions across industries."></p>
</section>

<section id="services" class="fade-section">
<h2 class="section-title" data-es="Servicios" data-en="Services"></h2>
<p data-es="Construcción, Tecnología, Salud, Finanzas, Logística y Asesoría."
data-en="Construction, Technology, Healthcare, Finance, Logistics, Advisory."></p>
</section>

<section id="contact" class="fade-section">
<h2 class="section-title" data-es="Contacto" data-en="Contact"></h2>

<form action="https://formspree.io/f/mbdwjgzz" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit" class="btn" data-es="Enviar" data-en="Send"></button>
</form>

</section>

<!-- SOCIAL -->
<div class="socials">
<a href="#"><svg viewBox="0 0 24 24"><path d="M22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0zM7.09 20.45H3.56V9h3.53v11.45zM5.33 7.56a2.05 2.05 0 110-4.1 2.05 2.05 0 010 4.1zM20.45 20.45h-3.53v-5.6c0-1.34-.02-3.07-1.87-3.07-1.87 0-2.16 1.46-2.16 2.97v5.7H9.36V9h3.39v1.56h.05c.47-.9 1.63-1.87 3.36-1.87 3.59 0 4.25 2.36 4.25 5.43v6.33z"/></svg></a>

<a href="#"><svg viewBox="0 0 24 24"><path d="M7.75 2C4.57 2 2 4.57 2 7.75v8.5C2 19.43 4.57 22 7.75 22h8.5C19.43 22 22 19.43 22 16.25v-8.5C22 4.57 19.43 2 16.25 2h-8.5zm4.25 5.2a4.8 4.8 0 110 9.6 4.8 4.8 0 010-9.6z"/></svg></a>

<a href="#"><svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 10-11.5 9.87v-6.99H7.9v-2.88h2.6V9.41c0-2.56 1.52-3.98 3.85-3.98"/></svg></a>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/123456789" class="whatsapp">
<svg viewBox="0 0 32 32">
<path d="M16 .4C7.4.4.4 7.4.4 16c0 2.8.7 5.4 2.1 7.7L0 32l8.5-2.2c2.2 1.2 4.7 1.8 7.5 1.8 8.6 0 15.6-7 15.6-15.6S24.6.4 16 .4z"/>
</svg>
</a>

<script>
function setLang(lang){
localStorage.setItem("lang", lang);
document.querySelectorAll('[data-es]').forEach(el=>{
el.innerText = el.getAttribute('data-'+lang);
});
document.getElementById("btn-es").classList.remove("active");
document.getElementById("btn-en").classList.remove("active");
document.getElementById("btn-"+lang).classList.add("active");
}
setLang(localStorage.getItem("lang") || "es");

const sections = document.querySelectorAll('.fade-section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
if(sec.getBoundingClientRect().top < window.innerHeight - 100){
sec.classList.add('show');
}
});
});
</script>

</body>
</html>
