<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme S.A.</title>

<!-- Google Font Premium -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #000;
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 40px;
    z-index: 10;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.nav-container {
    display: flex;
    align-items: center;
    gap: 40px;
}

.navbar img {
    height: 60px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-size: 15px;
    opacity: 0.8;
    transition: 0.3s;
}

.navbar a:hover {
    opacity: 1;
}

/* HERO VIDEO */
.hero {
    height: 100vh;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* HERO TEXT */
.hero-content h1 {
    font-size: 56px;
    margin-bottom: 20px;
    animation: fadeSlide 2s ease;
}

.hero-content p {
    font-size: 18px;
    margin-bottom: 30px;
    opacity: 0.8;
    animation: fadeSlide 2.5s ease;
}

.btn {
    padding: 14px 28px;
    border-radius: 30px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* SECTIONS */
.section {
    padding: 100px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(60px);
    transition: all 1s ease;
}

.section.visible {
    opacity: 1;
    transform: translateY(0);
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    color: white;
    text-decoration: none;
}

/* LANGUAGE SWITCH */
.lang-switch {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 20;
}

.lang-switch button {
    background: none;
    border: 1px solid white;
    color: white;
    padding: 5px 10px;
    margin-left: 5px;
    cursor: pointer;
}

/* ANIMATION */
@keyframes fadeSlide {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-switch">
    <button onclick="setLang('es')">ES</button>
    <button onclick="setLang('en')">EN</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-container">
        <img src="logo.png" alt="logo">
        <a href="#">Home</a>
        <a href="#">Servicios</a>
        <a href="#">Company</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <video autoplay muted loop>
        <source src="video.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="hero-content">
        <h1 id="title">Grupo Tierra Firme S.A.</h1>
        <p id="subtitle">Soluciones de capital inteligentes para el crecimiento empresarial</p>
        <a href="https://formspree.io/f/mbdwjgzz" class="btn">Get Started</a>
    </div>
</section>

<!-- SECTIONS WOW -->
<section class="section">
    <h2>Financiamiento Estratégico</h2>
    <p>Impulsamos empresas con capital flexible y eficiente.</p>
</section>

<section class="section">
    <h2>Expansión Internacional</h2>
    <p>Conectamos oportunidades entre USA y Panamá.</p>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/123456789" class="whatsapp">🟢</a>

<script>

/* SCROLL ANIMATION WOW */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            sec.classList.add('visible');
        }
    });
});

/* LANGUAGE SWITCH */
function setLang(lang) {
    if(lang === 'en'){
        document.getElementById('title').innerText = "Tierra Firme Group";
        document.getElementById('subtitle').innerText = "Smart capital solutions for business growth";
    } else {
        document.getElementById('title').innerText = "Grupo Tierra Firme S.A.";
        document.getElementById('subtitle').innerText = "Soluciones de capital inteligentes para el crecimiento empresarial";
    }
}

</script>

</body>
</html>
