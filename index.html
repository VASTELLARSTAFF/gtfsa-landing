<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Tierra Firme</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{color:white;}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
z-index:10;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(12px);
}

nav img{
height:60px; /* LOGO MÁS GRANDE */
position:absolute;
left:30px;
filter:drop-shadow(0 0 5px rgba(0,0,0,0.7));
}

nav ul{
display:flex;
gap:40px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
opacity:0.9;
}

nav a:hover{opacity:1;}

/* LANGUAGE SWITCH */
.lang{
position:absolute;
right:30px;
display:flex;
gap:10px;
}

.lang button{
background:none;
border:1px solid white;
color:white;
padding:5px 10px;
cursor:pointer;
border-radius:5px;
}

/* HERO VIDEO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:1;
}

.content{
position:relative;
z-index:2;
max-width:800px;
}

/* ANIMACIÓN MÁS SUAVE */
.fade-text{
opacity:0;
transform:translateX(-80px);
animation:fadeIn 3s ease forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:translateX(0);
}
}

h1{
font-size:52px;
margin-bottom:20px;
}

p{
font-size:18px;
opacity:0.85;
margin-bottom:30px;
}

.btn{
padding:14px 30px;
border-radius:30px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

/* FORM */
.form-section{
padding:80px 20px;
background:#111;
text-align:center;
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:12px;
border-radius:8px;
border:none;
}

button{
background:#2563eb;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:24px;
text-decoration:none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<img src="logo.png" alt="logo">

<ul>
<li><a href="#" data-en="Home" data-es="Inicio">Home</a></li>
<li><a href="#form" data-en="Contact" data-es="Contacto">Contact</a></li>
<li><a href="https://grupotierrafirme.com">Tierra Firme</a></li>
</ul>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<video autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">
<h1 class="fade-text" data-en="Grupo Tierra Firme S.A." data-es="Grupo Tierra Firme S.A.">
Grupo Tierra Firme S.A.
</h1>

<p class="fade-text"
data-en="Strategic investments and capital solutions"
data-es="Inversiones estratégicas y soluciones de capital">
Strategic investments and capital solutions
</p>

<a href="#form" class="btn"
data-en="Get Started"
data-es="Comenzar">
Get Started
</a>
</div>

</section>

<!-- FORM -->
<section id="form" class="form-section">
<h2 data-en="Get in Touch" data-es="Contáctanos">Get in Touch</h2>

<form action="https://formspree.io/f/mbdwjgzz" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/1234567890" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>
function setLang(lang){
document.querySelectorAll('[data-en]').forEach(el=>{
el.innerText = el.getAttribute('data-' + lang);
});
}
</script>

</body>
</html>
