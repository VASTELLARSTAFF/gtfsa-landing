<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Tierra Firme S.A.</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* HERO */
.hero{
    height:200vh; /* CLAVE para scroll controlado */
    position:relative;
}

.video-container{
    position:sticky;
    top:0;
    height:100vh;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXT BLOCKS */
.text-block{
    position:absolute;
    width:100%;
    top:50%;
    transform:translateY(-50%);
    text-align:center;
    opacity:0;
}

.text-block h1{
    font-size:60px;
}

.text-block p{
    margin-top:20px;
    opacity:.8;
}

/* NAV */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    padding:20px;
    z-index:100;
}

.navbar img{height:70px;}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:30px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="navbar">
    <img src="logo.png">
</div>

<section class="hero">

    <div class="video-container">
        <video id="video" autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- TEXT 1 -->
    <div class="text-block" id="text1">
        <h1>Grupo Tierra Firme S.A.</h1>
        <p>Capital inteligente para empresas que crecen</p>
    </div>

    <!-- TEXT 2 -->
    <div class="text-block" id="text2">
        <h1>Expande tu negocio</h1>
        <p>Acceso a financiamiento estratégico</p>
    </div>

    <!-- TEXT 3 -->
    <div class="text-block" id="text3">
        <h1>Conecta mercados</h1>
        <p>USA & Panamá en una sola estrategia</p>
    </div>

</section>

<a href="https://wa.me/123456789" class="whatsapp">🟢</a>

<script>

gsap.registerPlugin(ScrollTrigger);

/* TIMELINE PRINCIPAL */
let tl = gsap.timeline({
    scrollTrigger:{
        trigger:".hero",
        start:"top top",
        end:"bottom top",
        scrub:1
    }
});

/* VIDEO ZOOM */
tl.to("#video",{
    scale:1.3,
    ease:"none"
},0);

/* TEXT 1 */
tl.to("#text1",{opacity:1, duration:1},0.2)
  .to("#text1",{opacity:0, duration:1},0.5);

/* TEXT 2 */
tl.to("#text2",{opacity:1, duration:1},0.6)
  .to("#text2",{opacity:0, duration:1},0.8);

/* TEXT 3 */
tl.to("#text3",{opacity:1, duration:1},0.9);

</script>

</body>
</html>
